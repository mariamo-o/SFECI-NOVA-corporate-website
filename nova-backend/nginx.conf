worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    # Gzip
    gzip on; gzip_vary on; gzip_min_length 1024; gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/json application/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Internal upstream (Docker network)
    upstream nova_api {
        server api:3001;
        keepalive 32;
    }

    # ============================================================
    # HTTP → HTTPS redirect
    # Uncomment this block when TLS certs are mounted (production).
    # ============================================================
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ============================================================
    # Main server block (HTTP for development, HTTPS for production)
    # ============================================================
    server {
        listen 80;

        # --- HTTPS (production) ---
        # Uncomment and configure when TLS certificates are available.
        # Certificates can be:
        #   - Let's Encrypt via certbot: /etc/letsencrypt/live/<domain>/
        #   - Self-signed (dev): generated via scripts/gen-certs.sh
        #
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers off;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        server_name _;
        client_max_body_size 15M;
        root /usr/share/nginx/html;
        index index.html;

        # Health check — unrestricted, before API blocks
        location = /health {
            proxy_pass http://nova_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # Swagger API docs redirect to backend
        location /api-docs {
            proxy_pass http://nova_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # KYC Webhooks
        location /webhooks/ {
            proxy_pass http://nova_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Auth endpoints — stricter rate limit (before /api/ block)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://nova_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_buffering off;
        }

        # General API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://nova_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # Static assets — long cache
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA catch-all
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Block hidden files
        location ~ /\. { deny all; }
    }
}
