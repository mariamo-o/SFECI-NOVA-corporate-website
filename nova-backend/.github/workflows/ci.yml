name: NOVA Platform — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nova-backend

jobs:
  # ---- Lint & Security ----
  lint:
    runs-on: ubuntu-latest
    name: Lint & Static Analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nova-backend/package-lock.json
      - name: Install dependencies
        run: cd nova-backend && npm ci
      - name: Run ESLint
        run: cd nova-backend && npx eslint src/ --max-warnings 0 || true
      - name: Audit dependencies
        run: cd nova-backend && npm audit --audit-level=high

  # ---- Unit & Integration Tests ----
  test:
    runs-on: ubuntu-latest
    name: Tests
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nova_db_test
          POSTGRES_USER: nova_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: nova_db_test
      DB_USER: nova_user
      DB_PASSWORD: test_password
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_x
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters_x
      COOKIE_SECRET: ci_cookie_secret_at_least_32_characters_xx
      CSRF_SECRET: ci_csrf_secret_at_least_32_characters_xxxx
      PORT: 3001
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nova-backend/package-lock.json

      - name: Install dependencies
        run: cd nova-backend && npm ci

      - name: Run DB migrations
        run: cd nova-backend && npm run migrate
        env:
          NODE_ENV: test

      - name: Run all tests
        run: cd nova-backend && npm test -- --forceExit --detectOpenHandles --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: nova-backend/coverage
          fail_ci_if_error: false

  # ---- Docker Build ----
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: nova-backend
          file: nova-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Security Scan ----
  security-scan:
    runs-on: ubuntu-latest
    name: Container Security Scan
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
